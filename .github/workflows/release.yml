name: Release ISO

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/Build-ISO.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'push' && contains(github.event.base_ref, 'main') && startsWith(github.event.ref, 'refs/tags/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: archiso
          path: out/

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog
        run: |
          git-cliff --latest --strip header -o CHANGELOG.md
          if [ ! -s CHANGELOG.md ]; then
            echo "No changelog entries found for this release." > CHANGELOG.md
          fi
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.iso
            CHANGELOG.md
          body_path: CHANGELOG.md
          name: Release ${{ github.ref_name }}
          make_latest: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}